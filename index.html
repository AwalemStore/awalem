<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عوالم | Awalem</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ruby: #A55166;
            --cherry: #D38C9D;
            --pink-mist: #F7DAE7;
            --bg: #FBF5F7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg);
            color: #1d1d1f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .logo-area {
            text-align: center;
            margin-bottom: 50px;
        }
        .logo-area h1 {
            font-size: 2.5rem;
            color: var(--ruby);
            margin-bottom: 8px;
            font-weight: 800;
        }
        .logo-area p {
            font-size: 1.1rem;
            color: #666;
            font-weight: 500;
        }
        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            max-width: 900px;
            width: 100%;
        }
        .card {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(226,180,193,0.3);
            border-radius: 28px;
            padding: 40px 30px;
            width: 260px;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 24px rgba(165,81,102,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(165,81,102,0.15);
        }
        .card .icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .card h2 {
            font-size: 1.2rem;
            color: var(--ruby);
            margin-bottom: 10px;
            font-weight: 700;
        }
        .card p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.6;
        }
        .footer {
            margin-top: auto;
            padding-top: 50px;
            text-align: center;
            color: #86868b;
            font-size: 0.95rem;
            font-weight: 600;
        }
        @media (max-width: 700px) {
            .cards { flex-direction: column; align-items: center; }
            .card { width: 100%; max-width: 350px; }
        }
    </style>
</head>
<body>

    <div class="logo-area">
        <h1>عوالم</h1>
        <p>أدوات ذكية للعاملات المنزليات</p>
    </div>

    <div class="cards">
        <a href="routine/app/" class="card">
            <div class="icon">🗓️</div>
            <h2>الروتين الذكي</h2>
            <p>نظّمي الروتين اليومي وصمّمي جدول مهام مخصص بـ 11 لغة</p>
        </a>
        <a href="dictionary/app/" class="card">
            <div class="icon">📖</div>
            <h2>القاموس العام</h2>
            <p>أكثر من 200 كلمة يومية مترجمة بـ 11 لغة مختلفة</p>
        </a>
        <a href="food-dictionary/" class="card">
            <div class="icon">🍽️</div>
            <h2>قاموس المطبخ</h2>
            <p>250 كلمة للمطبخ والوجبات والمقادير بـ 11 لغة</p>
        </a>
    </div>

    <div class="footer">صنع من قبل عوالم Awalem</div>

</body>
</html>
